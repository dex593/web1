name: Build App Desktop Release

on:
  push:
    branches:
      - main
    paths:
      - "app_desktop/**"
      - ".github/workflows/app-desktop-release.yml"
  workflow_dispatch:

concurrency:
  group: app-desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_desktop/package-lock.json

      - name: Install app_desktop dependencies
        run: npm ci

      - name: Read app_desktop version
        id: desktop_version
        shell: bash
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build Windows desktop app
        run: npm run build:win

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          version="${{ steps.desktop_version.outputs.value }}"
          tag="app-desktop-v${version}"
          release_name="Moetruyen v${version}"
          body_path="dist/release-notes.md"

          {
            echo "tag=${tag}"
            echo "name=${release_name}"
            echo "body_path=app_desktop/${body_path}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# Moetruyen"
            echo
            echo "Desktop build v${version} for the latest \\`main\\` branch snapshot."
            echo
            echo "> [!WARNING]"
            echo "> This is a pre-release build intended for testing. It may change without notice."
            echo
            echo "## Downloads"
            echo
            echo "### Windows"

            shopt -s nullglob
            for file in dist/*.exe; do
              name="$(basename "$file")"
              echo "- [${name}](https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${name})"
            done
          } > "$body_path"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          body_path: ${{ steps.release_meta.outputs.body_path }}
          files: |
            app_desktop/dist/*.exe
