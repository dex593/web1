name: Build App Desktop Release

on:
  workflow_dispatch:

concurrency:
  group: app-desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_desktop/package-lock.json

      - name: Install app_desktop dependencies
        run: npm ci

      - name: Build Windows desktop app
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-desktop-windows
          if-no-files-found: error
          path: app_desktop/dist/*.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_desktop/package-lock.json

      - name: Install app_desktop dependencies
        run: npm ci

      - name: Build macOS desktop app
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-desktop-macos
          if-no-files-found: error
          path: |
            app_desktop/dist/*.dmg
            app_desktop/dist/*.zip

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-desktop-windows
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-desktop-macos
          path: release-assets/macos

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./app_desktop/package.json').version")"
          tag="app-desktop-v${version}"
          release_name="Moetruyen Desktop v${version} (Windows + macOS)"
          body_path="release-assets/release-notes.md"

          mkdir -p release-assets/windows release-assets/macos

          mapfile -t windows_files < <(find release-assets/windows -maxdepth 1 -type f -name "*.exe" -printf "%f\n" | sort)
          mapfile -t mac_files < <(find release-assets/macos -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" \) -printf "%f\n" | sort)

          windows_links=()
          if [ "${#windows_files[@]}" -gt 0 ]; then
            for file in "${windows_files[@]}"; do
              windows_links+=("- [${file}](https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${file})")
            done
          else
            windows_links+=("- Build artifact will appear here after the release upload finishes.")
          fi

          mac_links=()
          if [ "${#mac_files[@]}" -gt 0 ]; then
            for file in "${mac_files[@]}"; do
              mac_links+=("- [${file}](https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${file})")
            done
          else
            mac_links+=("- Build artifact will appear here after the release upload finishes.")
          fi

          {
            echo "# Moetruyen"
            echo
            echo "Desktop build v${version} for the latest \`main\` branch snapshot."
            echo
            echo "> [!WARNING]"
            echo "> This is a pre-release build intended for testing. It may change without notice."
            echo
            echo "## Downloads"
            echo
            echo "### Windows"
            printf "%s\n" "${windows_links[@]}"
            echo
            echo "### macOS"
            printf "%s\n" "${mac_links[@]}"
          } > "${body_path}"

          {
            echo "tag=${tag}"
            echo "name=${release_name}"
            echo "body_path=${body_path}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          body_path: ${{ steps.release_meta.outputs.body_path }}
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
