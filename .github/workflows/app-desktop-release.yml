name: Build App Desktop Release

on:
  workflow_dispatch:

concurrency:
  group: app-desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_desktop/package-lock.json

      - name: Install app_desktop dependencies
        run: npm ci

      - name: Read app_desktop version
        id: desktop_version
        shell: pwsh
        run: |
          $version = (Get-Content -Path "package.json" -Raw | ConvertFrom-Json).version
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows desktop app
        run: npm run build:win

      - name: Prepare release metadata
        id: release_meta
        shell: pwsh
        run: |
          $version = "${{ steps.desktop_version.outputs.value }}"
          $tag = "app-desktop-v$version"
          $releaseName = "Moetruyen v$version"
          $bodyPath = "dist/release-notes.md"

          @(
            "tag=$tag"
            "name=$releaseName"
            "body_path=app_desktop/$bodyPath"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          $downloadLines = Get-ChildItem -Path "dist" -Filter "*.exe" -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object {
              "- [$($_.Name)](https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/$($_.Name))"
            }

          if (-not $downloadLines) {
            $downloadLines = @("- Build artifact will appear here after the release upload finishes.")
          }

          @(
            "# Moetruyen"
            ""
            "Desktop build v$version for the latest `main` branch snapshot."
            ""
            "> [!WARNING]"
            "> This is a pre-release build intended for testing. It may change without notice."
            ""
            "## Downloads"
            ""
            "### Windows"
          ) + $downloadLines | Out-File -FilePath $bodyPath -Encoding utf8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          body_path: ${{ steps.release_meta.outputs.body_path }}
          files: |
            app_desktop/dist/*.exe
